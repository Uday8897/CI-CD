name: Dynamic Round Robin Issue Assignment

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Assign issue dynamically
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            // Read round-robin state file
            const statePath = ".github/rr_state.json";
            const state = JSON.parse(fs.readFileSync(statePath, "utf8"));
            let lastIndex = state.last;

            // Fetch collaborators dynamically
            const collaborators = await github.paginate(
              github.rest.repos.listCollaborators,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              }
            );

            // Filter users who have push or admin permission
            const team = collaborators
              .filter(c => c.permissions && c.permissions.push)
              .map(c => c.login);

            if (team.length === 0) {
              core.setFailed("No collaborators with push access found.");
              return;
            }

            core.info("Collaborators found: " + team.join(", "));

            // Round robin: pick next
            let nextIndex = (lastIndex + 1) % team.length;
            let selected = team[nextIndex];

            core.info(`Assigning issue to: ${selected}`);

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [selected]
            });

            // Update state
            state.last = nextIndex;
            fs.writeFileSync(statePath, JSON.stringify(state, null, 2));

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/rr_state.json
          git commit -m "Update round robin state" || echo "No changes"
          git push
